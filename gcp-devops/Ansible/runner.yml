---
- name: Setup GitHub Self-hosted Runner
  hosts: servers
  become: yes
  gather_facts: yes

  vars:
    runner_version: latest
    runner_user: runner
    runner_home: /home/runner
    github_token: "{{ lookup('env', 'GITHUB_TOKEN') }}"
    github_repo: "joe-nontakorn/portfolio"

  tasks:
    - name: Create runner user
      user:
        name: "{{ runner_user }}"
        shell: /bin/bash
        home: "{{ runner_home }}"
        createhome: yes

    - name: Install dependencies
      apt:
        name:
          - curl
          - wget
          - git
          - libssl-dev
          - libffi-dev
          - python3
          - python3-pip
          - jq
        state: present

    - name: Download GitHub Runner
      shell: |
        cd {{ runner_home }}
        mkdir -p actions-runner && cd actions-runner
        RUNNER_RELEASE=$(curl -s https://api.github.com/repos/actions/runner/releases/latest | jq -r '.tag_name' | sed 's/v//')
        curl -O -L https://github.com/actions/runner/releases/download/v${RUNNER_RELEASE}/actions-runner-linux-x64-${RUNNER_RELEASE}.tar.gz
        tar xzf ./actions-runner-linux-x64-${RUNNER_RELEASE}.tar.gz
      args:
        creates: "{{ runner_home }}/actions-runner/bin/Runner.Listener"
      become_user: "{{ runner_user }}"

    - name: Configure GitHub Runner
      shell: |
        cd {{ runner_home }}/actions-runner
        ./config.sh --url https://github.com/{{ github_repo }} --token {{ github_token }} --unattended --replace --name gcp-k3s-runner
      args:
        creates: "{{ runner_home }}/actions-runner/.runner"
      become_user: "{{ runner_user }}"
      environment:
        RUNNER_ALLOW_RUNASROOT: "true"

    - name: Install runner as service
      shell: |
        cd {{ runner_home }}/actions-runner
        sudo ./svc.sh install {{ runner_user }}

    - name: Start runner service
      systemd:
        name: "actions.runner.{{ github_repo | replace('/', '.') }}.gcp-k3s-runner"
        state: started
        enabled: yes
        daemon_reload: yes

    - name: Add runner user to docker group
      user:
        name: "{{ runner_user }}"
        groups: docker
        append: yes

    - name: Verify runner is online
      shell: |
        sleep 5
        curl -H "Authorization: token {{ github_token }}" \
          https://api.github.com/repos/{{ github_repo }}/actions/runners | \
          jq '.runners[] | select(.name=="gcp-k3s-runner")'
      retries: 3
      delay: 10
      register: runner_status

    - name: Display runner status
      debug:
        msg: "{{ runner_status.stdout }}"
